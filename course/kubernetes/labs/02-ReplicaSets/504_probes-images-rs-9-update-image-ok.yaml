apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: cats-neu
  labels:
    app: cats
spec:
  replicas: 9
  selector:
    matchLabels:
      app: cats
  template:
    metadata:
      labels:
        app: cats
    spec:
      containers:
      - name: cats
        image: raelga/cats:blanca
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 2