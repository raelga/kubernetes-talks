apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: cats-neu
  labels:
    app: cats
spec:
  replicas: 8
  selector:
    matchLabels:
      app: cats
  template:
    metadata:
      labels:
        app: cats
    spec:
      containers:
      - name: cats
        image: raelga/cats:neu
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 3
        livenessProbe:
          httpGet:
            path: /bad-endpoint
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 2