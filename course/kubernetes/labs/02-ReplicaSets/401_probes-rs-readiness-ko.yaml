apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: cats-neu
  labels:
    app: cats
spec:
  replicas: 4
  selector:
    matchLabels:
      app: cats
  template:
    metadata:
      labels:
        app: cats
    spec:
      containers:
      - name: cats
        image: raelga/cats:neu
        readinessProbe:
          tcpSocket:
            port: 81
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 3
