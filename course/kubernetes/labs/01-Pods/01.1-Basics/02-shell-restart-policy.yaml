---
apiVersion: v1
kind: Pod
metadata:
  name: shell-exit-ok
  labels:
    app: shell
spec:
  restartPolicy: Never
  containers:
  - name: shell
    image: raelga/toolbox
    command: ['bash', '-c', 'exit 0']
---
apiVersion: v1
kind: Pod
metadata:
  name: shell-exit-fail
  labels:
    app: shell
spec:
  restartPolicy: Never
  containers:
  - name: shell
    image: raelga/toolbox
    command: ['bash', '-c', 'exit 1']
